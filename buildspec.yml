version: 0.2

env:
  shell: bash
  variables:
    API_CONTAINER_NAME: finpilot-api
    WEB_CONTAINER_NAME: finpilot-web

phases:
  install:
    runtime-versions:
      python: 3.12
    commands:
      - python --version
      - pip install --upgrade pip
      - pip install -r requirements.txt
  pre_build:
    commands:
      - test -n "$AWS_REGION"
      - test -n "$ECR_REPOSITORY_URI"
      - ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
      - COMMIT_HASH=${CODEBUILD_RESOLVED_SOURCE_VERSION:-latest}
      - IMAGE_TAG=$(echo "$COMMIT_HASH" | cut -c1-12)
      - if [ -z "$IMAGE_TAG" ]; then IMAGE_TAG=latest; fi
      - aws ecr get-login-password --region "$AWS_REGION" | docker login --username AWS --password-stdin "$ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com"
  build:
    commands:
      - python -m pytest
      - docker build -t "$ECR_REPOSITORY_URI:$IMAGE_TAG" -f Dockerfile .
      - docker tag "$ECR_REPOSITORY_URI:$IMAGE_TAG" "$ECR_REPOSITORY_URI:latest"
  post_build:
    commands:
      - docker push "$ECR_REPOSITORY_URI:$IMAGE_TAG"
      - docker push "$ECR_REPOSITORY_URI:latest"
      - printf '[{"name":"%s","imageUri":"%s"},{"name":"%s","imageUri":"%s"}]' "$API_CONTAINER_NAME" "$ECR_REPOSITORY_URI:$IMAGE_TAG" "$WEB_CONTAINER_NAME" "$ECR_REPOSITORY_URI:$IMAGE_TAG" > imagedefinitions.json

artifacts:
  files:
    - imagedefinitions.json
